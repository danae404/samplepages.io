<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Multiple WebVTT Text Tracks - HLS</title>
<style>
video {
visibility: hidden;
}
</style>
<script>
window.addEventListener('load', async event => { 
let video = document.querySelector('video');
video.muted = true;
video.playsInline = true;

let src1 = video.appendChild(document.createElement('source'));
src1.src = 'multiple_text_tracks.m3u8';

	video.setAttribute("src", "multiple_text_tracks.m3u8");
video.load();

let button = document.querySelector('button');
button.addEventListener("pointerdown", async event => {
let video = document.querySelector('video');
video.innerHTML = "";
video.removeAttribute("src");
video.setAttribute("src", "multiple_text_tracks.m3u8");
});
});
</script>
</head>
<body>
<video controls playsinline></video>
</div>
<button>Re-load video</button>
