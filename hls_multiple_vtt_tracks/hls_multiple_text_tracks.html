<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Multiple WebVTT Text Tracks - HLS</title>
<style>
	video {
		border: 1px solid black;
		max-width: 100%;
	}
</style>
<script>
window.addEventListener('load', async event => { 
	var video = document.createElement('video');
	video.muted = true;
	video.playsInline = true;

	video.setAttribute("src", "multiple_text_tracks.m3u8");
	var srcElem = video.appendChild(document.createElement('source'));
	srcElem.src = 'multiple_text_tracks.m3u8';
	video.load();

	var button = document.querySelector('button');
	button.addEventListener("pointerdown", async event => {
		video.removeAttribute("src");
		video.innerHTML = "";
		video.setAttribute("src", "multiple_text_tracks.m3u8");
		var srcElem2 = video.appendChild(document.createElement('source'));
		srcElem2.src = 'multiple_text_tracks.m3u8';
	});
});
</script>
</head>
<body>
<button>Re-load video</button>
</body>
